<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JarodJay Appstore // Upload Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Cloudinary Upload Widget script -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #cbd5e1;
            --accent-glow: rgba(99, 102, 241, 0.3);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.2) 0%, transparent 40%);
        }

        .upload-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 550px;
        }

        .hero-title {
            font-weight: 700;
            background: linear-gradient(135deg, #a5b4fc 0%, #e879f9 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        form p {
            margin-bottom: 1.25rem;
        }

        form label {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
        }

        form input[type="text"], 
        form textarea {
            background: rgba(255, 255, 255, 0.06) !important;
            border: 1px solid var(--card-border) !important;
            color: #ffffff !important;
            border-radius: 10px !important;
            padding: 12px 15px !important;
            width: 100%;
            transition: all 0.3s ease;
        }

        /* Hide the default file input field generated by Django forms if present */
        form input[type="file"] {
            display: none !important;
        }

        form input::placeholder, 
        form textarea::placeholder {
            color: #cbd5e1;
            opacity: 0.7;
        }

        form input:focus, form textarea:focus {
            border-color: #818cf8 !important;
            box-shadow: 0 0 15px var(--accent-glow) !important;
            outline: none;
        }

        .btn-custom-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .btn-custom-primary:hover {
            background: linear-gradient(135deg, #4f46e5 100%, #4338ca 100%);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.6);
            transform: translateY(-1px);
            color: white;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #818cf8;
        }
    </style>
</head>
<body>

    <div class="container py-4">
        <div class="upload-card p-4 p-md-5 mx-auto">
            <div class="text-center mb-4">
                <h2 class="hero-title fs-3 mb-1">Upload New Application</h2>
                <p class="text-muted small m-0">Publish a new build package to your store</p>
            </div>

            <form method="post" enctype="multipart/form-data" id="appUploadForm">
                {% csrf_token %}
                {{ form.as_p }}

                <!-- Hidden field to capture the secure Cloudinary URL directly from client-side upload -->
                <input type="hidden" name="file_url" id="id_file_url">

                <!-- Direct Cloudinary Upload Widget Trigger -->
                <div class="mb-3">
                    <label class="form-label">Application File / Package</label>
                    <button type="button" id="upload_widget" class="btn btn-outline-light w-100 py-2 text-start d-flex align-items-center justify-content-between">
                        <span><i class="bi bi-folder2-open me-2"></i>Choose file to upload...</span>
                        <span class="badge bg-secondary">Cloud Uploader</span>
                    </button>
                    <div id="upload_status" class="form-text text-success mt-2 small"></div>
                </div>

                <button type="submit" class="btn btn-custom-primary w-100 mt-2">
                    <i class="bi bi-cloud-arrow-up me-2"></i>Publish Application
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="{% url 'app_list' %}" class="back-link small">
                    <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>

    <!-- Client-side Cloudinary Upload Widget Integration -->
    <script>
      const myWidget = cloudinary.createUploadWidget({
        cloudName: 'daubtyuya',
        uploadPreset: 'appstore_unsigned',
        maxFileSize: 500000000, // 500MB max file size support
        resource_type: 'auto'
      }, (error, result) => {
        if (!error && result && result.event === "success") {
          console.log('Upload complete: ', result.info.secure_url);
          // Inject secure link into hidden form input
          document.getElementById('id_file_url').value = result.info.secure_url;
          document.getElementById('upload_status').innerText = "✓ File uploaded successfully to Cloudinary cloud storage!";
        }
      });

      document.getElementById("upload_widget").addEventListener("click", function(e){
          e.preventDefault();
          myWidget.open();
      }, false);
    </script>
</body>
</html>
