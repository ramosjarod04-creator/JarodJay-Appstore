<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JarodJay Appstore // Upload Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Cloudinary Global Upload Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #cbd5e1;
            --accent-glow: rgba(99, 102, 241, 0.3);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.2) 0%, transparent 40%);
        }

        .upload-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 550px;
        }

        .hero-title {
            font-weight: 700;
            background: linear-gradient(135deg, #a5b4fc 0%, #e879f9 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.06) !important;
            border: 1px solid var(--card-border) !important;
            color: #ffffff !important;
            border-radius: 10px !important;
            padding: 12px 15px !important;
        }

        .form-control:focus {
            border-color: #818cf8 !important;
            box-shadow: 0 0 15px var(--accent-glow) !important;
            outline: none;
        }

        label {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .btn-custom-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .btn-custom-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, #4f46e5 100%, #4338ca 100%);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.6);
            transform: translateY(-1px);
            color: white;
        }

        .btn-custom-primary:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            cursor: not-allowed;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #818cf8;
        }
    </style>
</head>
<body>

    <div class="container py-4">
        <div class="upload-card p-4 p-md-5 mx-auto">
            <div class="text-center mb-4">
                <h2 class="hero-title fs-3 mb-1">Upload New Application</h2>
                <p class="text-muted small m-0">Publish a new build package to your store</p>
            </div>

            <div id="appUploadContainer">
                {% csrf_token %}
                <div class="mb-3">
                    <label>Application Name</label>
                    <input type="text" id="appName" class="form-control" placeholder="e.g. CyberApp" required>
                </div>

                <div class="mb-3">
                    <label>Version</label>
                    <input type="text" id="appVersion" class="form-control" placeholder="e.g. v1.0.0" required>
                </div>

                <div class="mb-3">
                    <label>Description</label>
                    <textarea id="appDescription" class="form-control" rows="3" placeholder="Brief details about the release..." required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Application Package File</label>
                    <!-- Triggers Cloudinary's isolated external overlay modal window -->
                    <button type="button" id="upload_widget_open" class="btn btn-outline-light w-100 py-2 text-start d-flex align-items-center justify-content-between">
                        <span id="upload_btn_text"><i class="bi bi-folder2-open me-2"></i>Choose file via Cloudinary...</span>
                        <span class="badge bg-secondary">Cloud Uploader</span>
                    </button>
                    <div id="upload_status" class="form-text text-warning mt-2 small">⚠️ Please upload your package file via the cloud uploader first.</div>
                </div>

                <button type="button" id="submitBtn" class="btn btn-custom-primary w-100 mt-2" disabled>
                    <i class="bi bi-cloud-arrow-up me-2"></i>Publish Application
                </button>
            </div>

            <div class="text-center mt-4">
                <a href="{% url 'app_list' %}" class="back-link small">
                    <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>

    <script>
      let uploadedFileUrl = "";

      // Initialize Cloudinary Widget configuration
      const myWidget = cloudinary.createUploadWidget({
        cloudName: 'daubtyuya',
        uploadPreset: 'appstore_unsigned',
        maxFileSize: 500000000, 
        resource_type: 'auto'
      }, (error, result) => {
        if (!error && result && result.event === "success") {
          uploadedFileUrl = result.info.secure_url;
          
          document.getElementById('upload_btn_text').innerHTML = `<i class="bi bi-check-circle-fill text-success me-2"></i> Ready: ${result.info.original_filename}`;
          document.getElementById('upload_status').className = "form-text text-success mt-2 small";
          document.getElementById('upload_status').innerText = "✓ File uploaded successfully to Cloudinary!";
          document.getElementById('submitBtn').removeAttribute('disabled');
        }
      });

      document.getElementById("upload_widget_open").addEventListener("click", function(e) {
          e.preventDefault();
          myWidget.open();
      }, false);

      document.getElementById("submitBtn").addEventListener("click", async function(e) {
          e.preventDefault();

          const name = document.getElementById('appName',).value;
          const version = document.getElementById('appVersion').value;
          const description = document.getElementById('appDescription').value;
          const csrfInput = document.querySelector('[name=csrfmiddlewaretoken]');
          const csrfToken = csrfInput ? csrfInput.value : '';

          if (!name || !version || !uploadedFileUrl) {
              alert("Please fill out all fields and ensure the file is uploaded.");
              return;
          }

          this.setAttribute('disabled', 'true');
          this.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Publishing...';

          try {
              // Sends a tiny JSON payload consisting of text characters only (< 1 KB)
              const response = await fetch("{% url 'upload_app' %}", {
                  method: "POST",
                  headers: {
                      "Content-Type": "application/json",
                      "X-CSRFToken": csrfToken
                  },
                  body: JSON.stringify({
                      name: name,
                      version: version,
                      description: description,
                      file_url: uploadedFileUrl
                  })
              });

              if (response.ok) {
                  window.location.href = "{% url 'app_list' %}";
              } else {
                  alert("Failed to save application record.");
                  this.removeAttribute('disabled');
                  this.innerHTML = '<i class="bi bi-cloud-arrow-up me-2"></i>Publish Application';
              }
          } catch (err) {
              console.error(err);
              alert("An error occurred during submission.");
              this.removeAttribute('disabled');
              this.innerHTML = '<i class="bi bi-cloud-arrow-up me-2"></i>Publish Application';
          }
      });
    </script>
</body>
</html>
